<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Warp-Core — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/effects.css') }}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    .login-box {
      position: relative;
      z-index: 10;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 40px 48px;
      width: 420px;
      box-shadow: 0 0 40px rgba(15,98,254,0.15);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .login-ibm-text { line-height: 1.2; }
    .login-ibm-label { font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: 0.1em; }
    .login-ibm-sub   { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; }

    .login-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--fg);
      margin-bottom: 4px;
    }

    .login-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .login-field { margin-bottom: 16px; }

    .login-field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .login-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
      box-sizing: border-box;
    }

    .login-field input:focus { border-color: var(--accent); }

    .login-error {
      font-size: 11px;
      color: #fa4d56;
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    .login-btn:hover { background: #0353e9; }

    .login-footer {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 24px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 31" height="36" fill="#0f62fe" aria-label="IBM">
      <rect x="0"  y="0"  width="8" height="3"/><rect x="0"  y="4"  width="8" height="3"/>
      <rect x="0"  y="8"  width="8" height="3"/><rect x="0"  y="12" width="8" height="3"/>
      <rect x="0"  y="16" width="8" height="3"/><rect x="0"  y="20" width="8" height="3"/>
      <rect x="0"  y="24" width="8" height="3"/><rect x="0"  y="28" width="8" height="3"/>
      <rect x="14" y="0"  width="13" height="3"/><rect x="14" y="4"  width="15" height="3"/>
      <rect x="14" y="8"  width="15" height="3"/><rect x="14" y="12" width="13" height="3"/>
      <rect x="14" y="16" width="13" height="3"/><rect x="14" y="20" width="15" height="3"/>
      <rect x="14" y="24" width="15" height="3"/><rect x="14" y="28" width="13" height="3"/>
      <rect x="35" y="0"  width="21" height="3"/>
      <rect x="35" y="4"  width="5"  height="3"/><rect x="43" y="4"  width="5" height="3"/><rect x="51" y="4"  width="5" height="3"/>
      <rect x="35" y="8"  width="4"  height="3"/><rect x="45" y="8"  width="3" height="3"/><rect x="52" y="8"  width="4" height="3"/>
      <rect x="35" y="12" width="4"  height="3"/><rect x="52" y="12" width="4" height="3"/>
      <rect x="35" y="16" width="4"  height="3"/><rect x="52" y="16" width="4" height="3"/>
      <rect x="35" y="20" width="4"  height="3"/><rect x="45" y="20" width="3" height="3"/><rect x="52" y="20" width="4" height="3"/>
      <rect x="35" y="24" width="5"  height="3"/><rect x="43" y="24" width="5" height="3"/><rect x="51" y="24" width="5" height="3"/>
      <rect x="35" y="28" width="21" height="3"/>
    </svg>
    <div class="login-ibm-text">
      <div class="login-ibm-label">IBM</div>
      <div class="login-ibm-sub">WARP-CORE RACING PLATFORM</div>
    </div>
  </div>

  <div class="login-title">MISSION CONTROL ACCESS</div>
  <div class="login-sub">Authorised personnel only · Terminal v1.0</div>

  <form method="post" action="/login">
    {% if error %}
    <div class="login-error">⚠ {{ error }}</div>
    {% endif %}

    <div class="login-field">
      <label>USER ID</label>
      <input type="text" name="username" autocomplete="username" autofocus>
    </div>

    <div class="login-field">
      <label>PASSWORD</label>
      <input type="password" name="password" autocomplete="current-password">
    </div>

    <button type="submit" class="login-btn">AUTHENTICATE →</button>
  </form>

  <div class="login-footer">IBM WARP-CORE TERMINAL &nbsp;·&nbsp; SECURE SESSION</div>
</div>

</body>
</html>
